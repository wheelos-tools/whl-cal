version: 1

selection:
  target_topic: /apollo/sensor/vanjeelidar/left_front/PointCloud2

planner:
  mode: explicit
  enable_global_optimization: true
  relations:
    - relation_id: lf_rf
      source_topic: /apollo/sensor/vanjeelidar/right_front/PointCloud2
      target_topic: /apollo/sensor/vanjeelidar/left_front/PointCloud2
      role: primary
    - relation_id: rf_rb
      source_topic: /apollo/sensor/vanjeelidar/right_back/PointCloud2
      target_topic: /apollo/sensor/vanjeelidar/right_front/PointCloud2
      role: primary
    - relation_id: rb_lb
      source_topic: /apollo/sensor/vanjeelidar/left_back/PointCloud2
      target_topic: /apollo/sensor/vanjeelidar/right_back/PointCloud2
      role: primary
    - relation_id: lb_lf
      source_topic: /apollo/sensor/vanjeelidar/left_back/PointCloud2
      target_topic: /apollo/sensor/vanjeelidar/left_front/PointCloud2
      role: primary

scene_sufficiency:
  max_windows_per_relation: 5
  min_valid_windows_per_relation: 2
  min_overlap_ratio: 0.15
  dynamic_distance_threshold_m: 0.40
  max_dynamic_unmatched_ratio: 0.65
  min_wall_plane_count: 1
  min_corner_pair_count: 1

repeatability:
  max_windows_per_edge: 5
  pass_translation_p95_m: 0.25
  pass_rotation_p95_deg: 2.0

visualization:
  enabled: true
  save_merged_clouds: true
  downsample_voxel_size: 0.10
  plane_distance_threshold: 0.08
  max_planes: 4
  min_plane_points: 600
  corner_angle_tolerance_deg: 20.0
  corner_distance_threshold_m: 0.12
  slice_bin_size_m: 0.25
  min_slice_points: 120
  max_wall_double_edge_m: 0.20
  max_corner_spread_p95_m: 0.15
  min_slice_sharpness_score: 6.0
