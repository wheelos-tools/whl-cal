camera:
  # cam2 = 192.168.1.64 (cam64). From whl-cal/intrinsics/intrinsics_cam64.yaml
  # (avg reprojection error 0.020 px, 1920x1080). Verified board: 11x8 / 0.045 m.
  intrinsics:
    - - 1377.0635762217391
      - 0.0
      - 951.2976516161268
    - - 0.0
      - 1377.4551017572842
      - 531.460884456436
    - - 0.0
      - 0.0
      - 1.0
  distortion:        # plumb_bob [k1, k2, p1, p2, k3]
    - -0.4183635165414517
    - 0.2197665412261714
    - -0.00013234759027782485
    - -0.00031309878007906026
    - -0.06794274647531112
checkerboard:
  pattern_size:      # interior corners (cols, rows)
    - 8
    - 11
  square_size: 0.045 # 45 mm

# --- inputs for the point-to-plane pipeline (extract/) ---
# Edit these per capture. Paths may be absolute or relative to this file.
data:
  camera_video:  data/cam2_192.168.1.64_00000.mkv   # HEVC camera recording
  camera_csv:    data/cam2_192.168.1.64.frames.csv  # per-frame clk_unix_ns sidecar
  livox_pcd_dir: data/livox_front_pcd               # PCDs from extract_pcd_from_bag.py
  detect_stride: 3       # run corner detection on every Nth video frame
  max_frame: 0           # 0 = scan whole video; else stop at this frame index
  n_poses: 24            # diverse board poses to select for calibration
  sync_tol_ms: 60        # max camera<->lidar timestamp gap when pairing

# staging dir the pipeline writes paired NNNN.png / NNNN.pcd into
data_directory: calibration_data
output:
  directory: calibration_output

# --- legacy reference_based.py only (deprecated, see README) ---
point_cloud:
  plane_dist_thresh: 0.03
  min_plane_points: 300
optimization:
  min_poses: 5
